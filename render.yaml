services:
  - type: web
    name: markmap
    env: php
    plan: free
    buildCommand: |
      composer install --optimize-autoloader --no-dev
      npm install
      npm run build
      php artisan migrate --force
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
      php artisan optimize
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://markmap.onrender.com
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: markmap-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: markmap-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: markmap-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: markmap-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: markmap-db
          property: password

databases:
  - name: markmap-db
    plan: free